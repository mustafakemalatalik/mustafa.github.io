<!DOCTYPE html>
<html lang="tr"> <head>
    <meta charset="utf-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> <title>Projeler | Ada Özkan</title> <link rel="icon" type="image/x-icon" href="adalogo.ico"> <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        @font-face { font-family: 'F1Black'; src: url('Formula1-Black.ttf') format('truetype'); }
        @font-face { font-family: 'F1Bold'; src: url('Formula1-Bold_web.ttf') format('truetype'); }
        @font-face { font-family: 'F1Regular'; src: url('Formula1-Regular-1.ttf') format('truetype'); }

        body { margin: 0; padding: 0; font-family: 'F1Regular', sans-serif; background: #0a0a0a; color: white; height: 100vh; overflow: hidden; }
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: 0; top: 0; left: 0; pointer-events: none; }
        .map-wrapper { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        #map { width: 100%; height: 100%; background: #0a0a0a; }

        .search-container { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 90%; max-width: 300px; }
        #citySearch {
            width: 100%; padding: 12px 15px; border-radius: 8px; border: 1px solid #3671c6;
            background: rgba(10, 10, 10, 0.95); color: white; font-size: 14px; outline: none; font-family: 'F1Regular', sans-serif;
            box-sizing: border-box;
        }

        .map-overlay-panel {
            position: absolute; top: 75px; right: 10px; background: rgba(10, 10, 10, 0.9);
            padding: 8px; z-index: 1000; border-radius: 12px; border: 1px solid #3671c6; display: flex; flex-direction: column; gap: 6px;
        }

        .info-box {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); 
            padding: 15px; background: rgba(20, 41, 72, 0.98);
            border-radius: 15px; border: 2px solid #27f4d2; z-index: 1000; 
            width: 85%; max-width: 400px;
            box-shadow: 0 0 20px rgba(39, 244, 210, 0.2); transition: 0.3s;
        }

        .info-box h4 { margin: 0 0 10px 0; color: #27f4d2; font-family: 'F1Black', sans-serif; border-bottom: 1px solid #3671c6; padding-bottom: 5px; font-size: 13px; }
        
        .leaflet-popup-content-wrapper { background: #142948; color: white; border: 1px solid #27f4d2; font-family: 'F1Regular', sans-serif; }
        .leaflet-popup-tip { background: #27f4d2; }
        .popup-btn { background: #27f4d2; color: black; border: none; padding: 8px; cursor: pointer; font-size: 12px; border-radius: 4px; font-family: 'F1Bold'; width: 100%; }

        button { margin: 1px; padding: 10px 14px; border: 1px solid #27f4d2; border-radius: 6px; cursor: pointer; background: transparent; color: #27f4d2; font-family: 'F1Regular', sans-serif; font-size: 11px; transition: 0.3s; min-height: 40px; }
        button:hover, button.active { background: #27f4d2; color: #000; }
        .reset-btn { border-color: #e8002d !important; color: #e8002d !important; }

        footer { position: fixed; bottom: 5px; left: 50%; transform: translateX(-50%); z-index: 1001; font-family: 'F1Black', sans-serif; font-size: 8px; opacity: 0.5; pointer-events: none; white-space: nowrap; }

        .leaflet-bottom.leaflet-left { margin-bottom: 160px; margin-left: 5px; }

        @media (min-width: 768px) {
            .info-box { left: auto; right: 20px; transform: none; width: 250px; }
            .search-container { left: 60px; transform: none; }
            .leaflet-bottom.leaflet-left { margin-bottom: 20px; }
        }
    </style>
</head>
<body>

<div id="particles-js"></div> <div class="map-wrapper">
    <div id="map"></div> <div class="search-container">
        <input type="text" id="citySearch" list="cityList" placeholder="Şehir ara..." onchange="goToCity(this.value)">
        <datalist id="cityList"></datalist>
    </div>

    <div class="map-overlay-panel">
        <button onclick="guncelle('nufus', this)">Nüfus</button>
        <button onclick="guncelle('yas', this)">Yaş</button>
        <button onclick="guncelle('medeni', this)">Medeni</button>
        <button onclick="guncelle('egitim', this)">Eğitim</button>
        <button onclick="resetMap()" class="reset-btn">Sıfırla</button>
    </div>

    <div id="infoBox" class="info-box">
        <h4 id="panelTitle">Detay Paneli</h4>
        <div id="infoContent">Analiz türü seçin veya harita üzerinde ölçüm yapın.</div>
    </div>
</div>

<footer>© 2026 ADA OZKAN • PERFORMANCE PORTFOLIO</footer>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
    particlesJS("particles-js", { "particles": { "number": { "value": 40 }, "color": { "value": "#27f4d2" }, "opacity": { "value": 0.2 }, "line_linked": { "enable": true, "color": "#3671c6" } } });

    // --- KATMAN TANIMLAMALARI ---
    var light = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png');
    var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
    var contours = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { opacity: 0.5 });

    var map = L.map('map', { layers: [light], zoomControl: false, tap: false }).setView([41.403, 27.355], 13);
    L.control.zoom({ position: 'bottomleft' }).addTo(map); 
    
    var cizilenOgeler = new L.FeatureGroup().addTo(map);
    var mahalleGrubu = new L.LayerGroup().addTo(map);
    var ozelNoktalarGrubu = new L.LayerGroup().addTo(map);
    var fayGrubu = new L.LayerGroup().addTo(map);

    L.control.layers(
        { "Sade": light, "Uydu": satellite }, 
        { 
            "İzohips (Topo)": contours, 
            "Fay Hatları": fayGrubu, 
            "Mahalleler": mahalleGrubu, 
            "Özel Konumlar": ozelNoktalarGrubu, 
            "Çizimler": cizilenOgeler 
        }, 
        { position: 'bottomleft', collapsed: true }
    ).addTo(map);

    /* --- FAY HATLARI --- */
    const detayliFaylar = {
        "type": "FeatureCollection",
        "features": [
            { "type": "Feature", "properties": { "name": "KAF - Marmara Segmenti", "risk": "Kritik" }, "geometry": { "type": "LineString", "coordinates": [[26.1, 40.4], [27.2, 40.6], [28.5, 40.8], [29.9, 40.8]] } },
            { "type": "Feature", "properties": { "name": "DAF - Maraş/Antakya Segmenti", "risk": "Kritik" }, "geometry": { "type": "LineString", "coordinates": [[35.8, 36.1], [36.5, 37.0], [37.8, 37.8], [39.0, 38.5]] } }
        ]
    };

    L.geoJSON(detayliFaylar, {
        style: function(feature) { return { color: "#ff0000", weight: 3, opacity: 0.7, dashArray: '5, 10' }; },
        onEachFeature: function(feature, layer) {
            layer.bindPopup("<b>" + feature.properties.name + "</b><br>Risk: " + feature.properties.risk);
        }
    }).addTo(fayGrubu);

    /* --- ÖZEL NOKTALAR (FOTOĞRAFLAR SİLİNDİ) --- */
    const ozelNoktalar = [
        { name: "Uras'ın Konumu", coords: [41.394079, 27.370980], color: "#33FF57" },
        { name: "Sarp'ın Konumu", coords: [41.429581, 27.101126], color: "#FF5733" },
        { name: "Ada'nın Konumu", coords: [40.888178, 26.896884], color: "#F333FF" },
        { name: "Zile", coords: [40.301905, 35.886380], color: "#FF3333" },
        { name: "Yusuf'un Konumu", coords: [41.398083, 27.350222], color: "#FFD700" },
        { name: "Edirne", coords: [41.677065, 26.555878], color: "#ADFF2F" },
        { name: "Mamak", coords: [39.912075, 32.920025], color: "#00FFFF" },
        { name: "Çatalca", coords: [41.142002, 28.454694], color: "#3357FF" }
    ];

    ozelNoktalar.forEach(n => {
        L.circleMarker(n.coords, { 
            radius: 10, 
            fillColor: n.color, 
            color: "#fff", 
            weight: 3, 
            fillOpacity: 0.8 
        }).addTo(ozelNoktalarGrubu).bindPopup(`<b>${n.name}</b>`);
    });

    /* --- ÇİZİM ARAÇLARI --- */
    var drawControl = new L.Control.Draw({ 
        edit: { featureGroup: cizilenOgeler }, 
        draw: { polygon: true, polyline: true, rectangle: true, circle: true, marker: true } 
    });
    map.addControl(drawControl);

    function updatePopupContent(layer) {
        var type = layer.drawType, name = layer.customName || "Yeni Ölçüm", color = layer.options.color || "#27f4d2";
        var content = `<div style="min-width:160px; color:white;"><b>${name}</b><br>`;
        if (type === 'marker') {
            var ll = layer.getLatLng();
            content += `<small>Konum: ${ll.lat.toFixed(5)}, ${ll.lng.toFixed(5)}</small>`;
        } else if (type === 'circle') {
            content += `<small>Alan: ${(Math.PI * Math.pow(layer.getRadius(), 2) / 1000000).toFixed(4)} km²</small>`;
        } else if (type === 'polygon' || type === 'rectangle') {
            content += `<small>Alan: ${(L.GeometryUtil.geodesicArea(layer.getLatLngs()[0]) / 1000000).toFixed(3)} km²</small>`;
        } else if (type === 'polyline') {
            var pts = layer.getLatLngs(), d = 0;
            for (var i=0; i<pts.length-1; i++) d += pts[i].distanceTo(pts[i+1]);
            content += `<small>Mesafe: ${(d/1000).toFixed(3)} km</small>`;
        }
        content += `<div class="popup-controls"><button class="popup-btn" onclick="renameLayer(${L.stamp(layer)})">İsmi Düzenle</button>Renk: <input type="color" value="${color}" onchange="changeLayerColor(${L.stamp(layer)}, this.value)"></div></div>`;
        layer.bindPopup(content);
        document.getElementById('panelTitle').innerText = name;
        document.getElementById('infoContent').innerHTML = content;
    }

    window.renameLayer = function(id) {
        var layer = cizilenOgeler.getLayer(id);
        var newName = prompt("İsim:", layer.customName || "");
        if (newName) { layer.customName = newName; updatePopupContent(layer); layer.openPopup(); }
    };

    window.changeLayerColor = function(id, newColor) {
        var layer = cizilenOgeler.getLayer(id);
        if (layer.setStyle) layer.setStyle({ color: newColor, fillColor: newColor });
        layer.options.color = newColor; 
        updatePopupContent(layer);
    };

    map.on(L.Draw.Event.CREATED, function (e) {
        var layer = e.layer;
        layer.drawType = e.layerType;
        layer.customName = "Yeni Ölçüm";
        if (layer.setStyle) layer.setStyle({ color: '#27f4d2', fillColor: '#27f4d2', weight: 3, fillOpacity: 0.4 });
        cizilenOgeler.addLayer(layer);
        updatePopupContent(layer);
    });

    /* --- ARAMA --- */
    const iller = {"Adana":[37,35.32],"Ankara":[39.93,32.85],"İstanbul":[41,28.97],"İzmir":[38.42,27.14],"Edirne":[41.68,26.56],"Tekirdağ":[40.98,27.51]};
    const dl = document.getElementById('cityList');
    Object.keys(iller).sort().forEach(il => { let opt = document.createElement('option'); opt.value = il; dl.appendChild(opt); });
    
    function goToCity(val) { 
        if(iller[val]) map.flyTo(iller[val], 11); 
    }

    /* --- MAHALLE VERİLERİ --- */
    const mahalleler = [{name:"Sevgi", lat:41.3919, lon:27.3454, nufus:2100, yas:"65+", medeni:"Bekar", egitim:"Lisans"},{name:"8 Kasım", lat:41.3901, lon:27.3549, nufus:10900, yas:"40-44", medeni:"Evli", egitim:"Lise"}];

    var aktifKategori = "", katmanlar = [];
    mahalleler.forEach(m => {
        var marker = L.circleMarker([m.lat, m.lon], { radius: 10, fillColor: "#ccc", color: "#fff", weight: 2, fillOpacity: 0.8 }).addTo(mahalleGrubu);
        marker.veri = m; 
        marker.on("click", function() {
            if(!aktifKategori) return;
            document.getElementById('panelTitle').innerText = aktifKategori.toUpperCase() + " Verisi";
            document.getElementById('infoContent').innerHTML = `<b>${m.name} Mah.</b><br>${aktifKategori}: ${m[aktifKategori]}`;
        });
        katmanlar.push(marker);
    });

    function guncelle(tip, btn) {
        aktifKategori = tip;
        document.querySelectorAll('.map-overlay-panel button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        katmanlar.forEach(k => {
            let v = k.veri[tip], r = "#ccc";
            if(tip==='nufus') r = v > 8000 ? '#08306b' : v > 4000 ? '#4292c6' : '#9ecae1';
            else if(tip==='egitim') r = v==="Lisans" ? '#27f4d2' : v==="Lise" ? '#3671c6' : '#e8002d';
            else if(tip==='yas') r = v==="65+" ? '#e8002d' : v==="40-44" ? '#ffa500' : '#27f4d2';
            else if(tip==='medeni') r = v==="Evli" ? '#3671c6' : '#f427d2';
            k.setStyle({ fillColor: r });
        });
    }

    function resetMap() { map.setView([41.403, 27.355], 13); cizilenOgeler.clearLayers(); }

</script>
</body>
</html>
